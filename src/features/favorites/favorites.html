<div class="favorites-container p-[3.5rem]">
  @if (favoritesService.count() === 0) {
    <div class="empty-state flex flex-col items-center justify-center h-[50vh]">
      <h2 class="text-[3rem] text-gray-600 mb-[1.5rem]">No favorites yet</h2>
      <a routerLink="/home" class="text-[1.8rem] text-green-700 hover:underline">Browse products</a>
    </div>
  } @else {
    <h1 class="text-[3rem] mb-[2rem]">My Favorites ({{ favoritesService.count() }})</h1>
    <div class="grid grid-cols-[repeat(auto-fill,minmax(min(30rem,100%),1fr))]  gap-[2rem]">
      @for (product of favoritesService.favorites(); track product.id) {
        <div
          class="product-card bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow"
        >
          <a [routerLink]="['/product-detail', product.id]" class="block">
            <div class="h-[35rem] overflow-hidden bg-blue-100">
              <img
                [src]="product.thumbnail"
                [alt]="product.title"
                class="w-full h-full object-cover"
              />
            </div>
          </a>
          <div class="p-[1.5rem]">
            <a [routerLink]="['/product', product.id]">
              <h3 class="text-[1.8rem] font-semibold mb-[0.5rem] hover:text-green-700">
                {{ product.title }}
              </h3>
            </a>
            <p class="text-[1.4rem] text-gray-500 mb-[1rem]">{{ product.category }}</p>
            <div class="flex items-center justify-between">
              <p class="text-[2rem] font-bold text-green-900">${{ product.price }}</p>
              <button
                (click)="favoritesService.remove(product.id)"
                class="px-[1rem] py-[0.5rem] bg-red-500 text-white rounded-md hover:bg-red-600 transition-colors text-[1.4rem]"
              >
                Remove
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
