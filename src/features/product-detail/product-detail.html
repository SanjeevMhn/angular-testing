@if (product$ | async; as detail) {
  <div class="detail-container p-[3.5rem]">
    <div class="grid lg:grid-cols-2 gap-[2.5rem] lg:gap-[5.5rem] product-card">
      <div class="img-container row-[1] col-[1]">
        <div class="main-image bg-blue-300 rounded-2xl overflow-hidden mb-[1.5rem]">
          <img [src]="detail.images[activeImgIndex()]" alt="" class="w-full h-full object-cover" />
        </div>
        @if (detail.images.length > 1) {
          <ul class="images-list flex gap-[0.5rem]">
            @for (img of detail.images; track img) {
              <li
                class="img-item w-[5rem] h-[5rem] bg-blue-300 rounded-md cursor-pointer"
                [class]="$index == activeImgIndex() ? 'border-2' : ''"
                (click)="activeImgIndex.set($index)"
              >
                <img [src]="img" alt="" class="w-full h-full object-cover" />
              </li>
            }
          </ul>
        }
      </div>
      <div class="detail-info col-[1] lg:col-[2] lg:row-[1] row-[2] flex flex-col justify-center">
        <h2 class="text-[2.2rem] lg:text-[3.5rem]">{{ detail.title }}</h2>
        <a
          [routerLink]="['/home']"
          [queryParams]="{ category: detail.category }"
          class="text-[1.8rem] py-[0.5rem] text-gray-600"
          >{{ detail.category }}</a
        >
        <div class="py-[0.5rem]"></div>
        <div class="flex flex-wrap items-center gap-[1.5rem] lg:gap-[2.5rem]">
          <p class="text-[2.8rem] text-green-900">${{ detail.price }}</p>
          <app-rating [rating]="detail.rating" />
          <p class="text-[1.8rem]">({{ detail.reviews.length }} Reviews)</p>
        </div>
        <div class="py-[0.5rem]"></div>
        <p class="description text-[1.8rem]">{{ detail.description }}</p>
        <div class="py-[1.2rem]"></div>
        <button
          type="button"
          class="cursor-pointer flex p-[1rem_1.5rem] text-[1.8rem] bg-green-900 rounded-md text-center text-white justify-center"
        >
          Add to Cart
        </button>
        <div class="py-[0.5rem]"></div>
        <button
          type="button"
          (click)="toggleFavorite(detail)"
          class="cursor-pointer flex p-[1rem_1.5rem] text-[1.8rem] rounded-md text-center justify-center"
        >
          {{ isFavorite(detail.id) ? 'Remove from Favorites' : 'Save to Favorites' }}
        </button>
      </div>
    </div>
  </div>
} @else {
  <div class="loading-container flex w-full h-full items-center justify-center">
    <h2 class="text-amber-400 text-[5rem]">Loading...</h2>
  </div>
}
